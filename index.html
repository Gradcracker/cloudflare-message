<!DOCTYPE html>
<html>
    <head>
        <title>Gradcracker - We'll be right back</title>

        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700,800" rel="stylesheet">

        <style>
            html, body {
                height: 100%;
                margin: 0;
                padding: 0;
                background: #1a202c;
                font-family: 'Open Sans', sans-serif;
            }

            body {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .content {
                text-align: center;
                max-width: 560px;
                padding: 0 20px;
            }

            .content img {
                width: 100%;
                max-width: 260px;
                height: auto;
                margin-top: clamp(30px, 6vw, 48px);
            }

            .content h1 {
                color: #f97316;
                font-size: clamp(22px, 6vw, 28px);
                font-weight: 700;
                margin: 0 0 16px;
            }

            .content p {
                color: #e2e8f0;
                font-size: clamp(15px, 4vw, 18px);
                font-weight: 400;
                line-height: 1.6;
                margin: 0 0 16px;
            }

            .content p br {
                display: none;
            }

            @media (min-width: 480px) {
                .content p br {
                    display: inline;
                }
            }

            .status {
                margin-top: 40px;
                color: #94a3b8;
                font-size: 14px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }

            .status-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #f97316;
                animation: pulse 2s ease-in-out infinite;
            }

            @keyframes pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.3; }
            }
        </style>
    </head>
    <body>
        <div class="content">
            <h1>Scheduled Maintenance</h1>
            <p>Between 7pm and <span id="maintenance-end">8pm</span> this evening, <br>Gradcracker will be offline for a server upgrade.</p>
            <p>We are sorry for the inconvenience.</p>
            <img src="https://djrbepx1gcy8b.cloudfront.net/brand/gradcracker-white-orange-reg.svg" alt="Gradcracker">
            <div style="display: none;">::CLOUDFLARE_ERROR_500S_BOX::</div>
        </div>

        <script>
            (function () {
                function formatHour(h) {
                    var hr = h % 12 || 12;
                    return hr + (h < 12 ? 'am' : 'pm');
                }

                function updateEndTime() {
                    var hour = new Date().getHours();
                    var endHour = Math.max(hour + 1, 20);
                    document.getElementById('maintenance-end').textContent = formatHour(endHour);
                }

                updateEndTime();
                setInterval(updateEndTime, 60000);

                var startDay = new Date().getDate();

                function poll() {
                    if (new Date().getDate() !== startDay) {
                        return;
                    }

                    fetch(location.href, { method: 'HEAD', cache: 'no-store' })
                        .then(function (response) {
                            if (response.ok) {
                                location.reload();
                            }
                        })
                        .catch(function () {})
                        .finally(function () {
                            setTimeout(poll, 26000 + Math.random() * 4000);
                        });
                }
                setTimeout(poll, 26000 + Math.random() * 4000);
            })();
        </script>
    </body>
</html>
